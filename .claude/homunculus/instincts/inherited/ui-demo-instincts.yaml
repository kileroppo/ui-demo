# Ui Demo Workflow Add New Feature Or Component

## Action

Follow the add-new-feature-or-component workflow:
1. Create or update one or more files in src/components/, src/pages/, src/hooks/, or src/utils/ to implement the feature.
2. Update or create corresponding test files in src/test/components/, src/test/pages/, src/test/hooks/, or src/test/utils/.
3. Update shared files (e.g., src/index.css, src/App.tsx, src/components/Layout.tsx) if necessary for integration or styling.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~10x per month
- Files: src/components/*.tsx, src/pages/*.tsx, src/hooks/*.ts

